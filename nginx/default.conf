map $http_upgrade $connection_upgrade { 
    default upgrade; 
    '' close;
}

upstream django_app { 
    server web:8000;
}
server{ 
    listen 80; 
    server_name localhost;
    client_max_body_size 25M;
    
    location /static/ {
        alias /var/www/static/;
        expires 30d;
        add_header Cache-Control "max-age=2592000";
       
    }
    location /media/ {
         alias /var/www/media/;
         expires 30d;   
    }
}