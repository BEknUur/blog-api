version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build: .
    expose:
      - "8000"
    env_file: backend/settings/.env
    volumes:
      - sqlite_data:/app/backend/db.sqlite3
      - static_data:/app/backend/static
      - media_data:/app/backend/media
    depends_on:
      redis:
        condition: service_healthy
    command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "settings.asgi:application"]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    depends_on:
      - web 
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/var/www/static:ro
      - media_data:/var/www/media:ro


  celery_worker:
    build: .
    env_file: backend/settings/.env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A settings worker -l info

  celery_beat:
    build: .
    env_file: backend/settings/.env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A settings beat -l info

  flower:
    build: .
    ports:
      - "5555:5555"
    env_file: backend/settings/.env
    depends_on:
      redis:
        condition: service_healthy
    command: >
      celery -A settings flower
      --basic-auth=${BLOG_FLOWER_USER}:${BLOG_FLOWER_PASSWORD}

volumes:
  sqlite_data:
  media_data:
  static_data:

